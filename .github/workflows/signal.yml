name: Gemini-Trader Intelligence Pipeline

on:
  schedule:
    # Runs every hour to scan for new structural setups
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows for manual triggering from the GitHub Actions UI

jobs:
  trade-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Data Directory Exists
        run: mkdir -p data

      - name: Run Gemini-Trader Engine
        env:
          # XT Exchange Credentials
          XT_API_KEY: ${{ secrets.XT_API_KEY }}
          XT_SECRET_KEY: ${{ secrets.XT_SECRET_KEY }}
          
          # Phase 2: On-Chain Sentiment
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          
          # Phase 1: Notifications
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          
          # System Constants
          DB_PATH: "data/signals.db"
          PYTHONPATH: "."
        run: python -m bot.main

      - name: Persistence Sync (Commit Signal History)
        # This step ensures the Neural Layer (Phase 4) has data to learn from
        run: |
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@gemini-trader.ai"
          git add data/signals.db
          git commit -m "chore: sync signal database [skip ci]" || echo "No changes to commit"
          git push
